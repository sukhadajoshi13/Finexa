<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinRight AI - Expense Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: #ff4444;
        }

        .status.connected {
            background-color: #44ff44;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f8f9fa;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.error .message-content {
            background: #ffe0e0;
            color: #c00;
            border-left: 3px solid #c00;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            border-top: 1px solid #e0e0e0;
            padding: 16px;
            display: flex;
            gap: 8px;
            background: white;
            border-radius: 0 0 12px 12px;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .config-section {
            margin-bottom: 12px;
        }

        .config-section label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .config-section input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .setup-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .setup-modal.show {
            display: flex;
        }

        .setup-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .setup-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .setup-content button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            font-size: 14px;
        }

        .setup-content button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="setup-modal" id="setupModal">
        <div class="setup-content">
            <h2>WebSocket Configuration</h2>
            <div class="config-section">
                <label for="mongoId">Expense Document ID (mongo_id):</label>
                <input type="text" id="mongoId" placeholder="e.g., 550e8400-e29b" value="testdoc">
            </div>
            <div class="config-section">
                <label for="wsUrl">WebSocket URL:</label>
                <input type="text" id="wsUrl" placeholder="ws://localhost:8000" value="ws://localhost:8000">
            </div>
            <div class="config-section">
                <label for="token">JWT Token (optional):</label>
                <input type="text" id="token" placeholder="Leave empty for anonymous">
            </div>
            <button onclick="startChat()">Connect to Chat</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>💰 FinRight AI</h1>
            <p><span class="status" id="statusDot"></span><span id="statusText">Disconnected</span></p>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Ask about your expenses..."
                disabled
            >
            <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        let mongoId = "testdoc";
        let wsUrl = "ws://localhost:8000";
        let token = "";
        let isConnected = false;

        const messagesDiv = document.getElementById("messages");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const setupModal = document.getElementById("setupModal");

        function updateStatus(connected, text) {
            isConnected = connected;
            statusDot.classList.toggle("connected", connected);
            statusText.textContent = text;
            messageInput.disabled = !connected;
            sendBtn.disabled = !connected;
        }

        function addMessage(sender, text, type = "message") {
            const messageEl = document.createElement("div");
            messageEl.className = `message ${sender} ${type === "error" ? "error" : ""}`;
            
            const contentEl = document.createElement("div");
            contentEl.className = "message-content";
            contentEl.textContent = text;
            
            messageEl.appendChild(contentEl);
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const messageEl = document.createElement("div");
            messageEl.className = "message ai";
            messageEl.id = "typingIndicator";
            
            const contentEl = document.createElement("div");
            contentEl.className = "typing-indicator";
            contentEl.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            
            messageEl.appendChild(contentEl);
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById("typingIndicator");
            if (indicator) {
                indicator.remove();
            }
        }

        function startChat() {
            mongoId = document.getElementById("mongoId").value || "testdoc";
            wsUrl = document.getElementById("wsUrl").value || "ws://localhost:8000";
            token = document.getElementById("token").value || "";

            if (!mongoId || !wsUrl) {
                alert("Please fill in all required fields");
                return;
            }

            setupModal.classList.remove("show");
            messagesDiv.innerHTML = "";
            connectWebSocket();
        }

        function connectWebSocket() {
            updateStatus(false, "Connecting...");

            const fullUrl = token 
                ? `${wsUrl}/ws/ai/chat/${mongoId}/?token=${token}`
                : `${wsUrl}/ws/ai/chat/${mongoId}/`;

            try {
                ws = new WebSocket(fullUrl);

                ws.onopen = () => {
                    console.log("WebSocket connected");
                    updateStatus(true, "Connected");
                    addMessage("ai", "👋 Hello! Ask me about your expenses.");
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        console.log("Received:", data);

                        if (data.type === "typing") {
                            if (data.status === "start") {
                                removeTypingIndicator();
                                showTypingIndicator();
                            } else if (data.status === "stop") {
                                removeTypingIndicator();
                            }
                        } else if (data.type === "token") {
                            // Streaming token received: append to partial AI message
                            removeTypingIndicator();
                            appendTokenToPartial(data.text);
                        } else if (data.type === "done") {
                            removeTypingIndicator();
                            // Finalize partial (if exists) with full complete text
                            const partial = document.getElementById("aiPartialContent");
                            if (partial) {
                                partial.textContent = data.complete;
                                partial.removeAttribute('id');
                            } else {
                                addMessage("ai", data.complete);
                            }
                        } else if (data.type === "error") {
                            removeTypingIndicator();
                            addMessage("ai", `Error: ${data.error}`, "error");
                        }
                    } catch (e) {
                        console.error("Error parsing message:", e);
                    }
                };

                ws.onerror = (error) => {
                    console.error("WebSocket error:", error);
                    updateStatus(false, "Error connecting");
                    addMessage("ai", "Connection error. Please check your settings.", "error");
                };

                ws.onclose = () => {
                    console.log("WebSocket disconnected");
                    updateStatus(false, "Disconnected");
                };
            } catch (e) {
                console.error("Error creating WebSocket:", e);
                updateStatus(false, "Failed to connect");
                addMessage("ai", `Connection failed: ${e.message}`, "error");
            }
        }

        function appendTokenToPartial(token) {
            // Ensure there's a partial AI message to append to
            let partialContent = document.getElementById("aiPartialContent");
            if (!partialContent) {
                const messageEl = document.createElement("div");
                messageEl.className = `message ai`;
                const contentEl = document.createElement("div");
                contentEl.className = "message-content";
                contentEl.id = "aiPartialContent";
                contentEl.textContent = token;
                messageEl.appendChild(contentEl);
                messagesDiv.appendChild(messageEl);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                return;
            }

            // Append token with a space
            partialContent.textContent = partialContent.textContent + (partialContent.textContent ? " " : "") + token;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            addMessage("user", message);
            messageInput.value = "";

            try {
                ws.send(JSON.stringify({ question: message }));
            } catch (e) {
                console.error("Error sending message:", e);
                addMessage("ai", `Failed to send message: ${e.message}`, "error");
            }
        }

        // Allow Enter key to send
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Show setup modal on load
        window.addEventListener("load", () => {
            setupModal.classList.add("show");
        });
    </script>
</body>
</html>
